name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (all workspaces)
        run: pnpm typecheck

  test-contracts:
    name: Test — contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test contracts
        run: pnpm --filter @inbox/contracts test

  test-bff:
    name: Test — BFF
    runs-on: ubuntu-latest
    env:
      INBOX_DB: ':memory:'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts (BFF depends on compiled dist)
        run: pnpm --filter @inbox/contracts build
      - name: Test BFF
        run: pnpm --filter @inbox/bff test

  test-ui:
    name: Test — UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts (UI depends on compiled dist)
        run: pnpm --filter @inbox/contracts build
      - name: Test UI
        run: pnpm --filter @inbox/ui test

  e2e-ui:
    name: E2E — UI (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts (UI depends on compiled dist)
        run: pnpm --filter @inbox/contracts build
      - name: Install Playwright browsers
        run: pnpm --filter @inbox/ui exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm --filter @inbox/ui exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/ui/playwright-report/
          retention-days: 14

  build-all:
    name: Build — all workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all workspaces
        run: pnpm build

  openapi-drift-check:
    name: OpenAPI spec drift
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @inbox/contracts build
      - run: pnpm --filter @inbox/bff build
      - name: Regenerate openapi.json
        run: pnpm gen:openapi
      - name: Check for drift
        run: |
          git diff --exit-code packages/contracts/openapi.json \
            || { echo "::error::openapi.json drift — run 'pnpm gen:openapi' and commit the result"; exit 1; }
